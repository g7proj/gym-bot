name: Daily Gym Booking

on:
  schedule:
    - cron: '5 6 * * *'  # Runs daily at 6:05 AM UTC (7:05 AM CET)
  workflow_dispatch:  # Allows manual triggering for testing

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run gym booking
        env:
          GYM_USERNAME: ${{ secrets.GYM_USERNAME }}
          GYM_PASSWORD: ${{ secrets.GYM_PASSWORD }}
          GYM_APP_TOKEN: ${{ secrets.GYM_APP_TOKEN }}
        run: |
          cd src
          python -m gym_bot.cli --book