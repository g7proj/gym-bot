name: Daily Gym Booking

on:
  schedule:
    # Every 30 minutes during the morning window (UTC).
    # 05:00-07:30 UTC = 07:00-09:30 CEST / 06:00-08:30 CET.
    - cron: '0,30 5-7 * * *'
  workflow_dispatch:  # Allows manual triggering for testing

jobs:
  book:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run gym booking for all users
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/book_all_users.py
